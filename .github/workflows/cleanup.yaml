name: Cleanup

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  metadata-collector:
    uses: ./.github/workflows/metadata-collector.yaml

  packages:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    needs: metadata-collector
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(needs.metadata-collector.outputs.charts) }}
    steps:
      - name: GitHub Slug Action
        uses: rlespinasse/github-slug-action@e6f261660910b273384c5c42b17a0217881b217a # v5.6.0

      - name: Cleanup Helm chart
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ env.GITHUB_REPOSITORY_NAME_PART_SLUG }}%2F${{ env.GITHUB_EVENT_REF_SLUG || env.GITHUB_HEAD_REF_SLUG }}%2F${{ matrix.chart }}
